<svg width="512" height="512" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="oceanBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="35%" stop-color="#0a4f6d"/>
      <stop offset="70%" stop-color="#061f35"/>
      <stop offset="100%" stop-color="#030a14"/>
    </linearGradient>
    <linearGradient id="gCoral" x1="0%" y1="100%" x2="40%" y2="0%">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="gCyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="coralGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <!-- Caustic light effect -->
    <filter id="caustic" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Ocean gradient background -->
  <rect width="140" height="140" rx="28" fill="url(#oceanBg)"/>

  <!-- Caustic light rays from surface -->
  <g opacity="0.08">
    <line x1="30" y1="0" x2="38" y2="80" stroke="#67e8f9" stroke-width="8"/>
    <line x1="70" y1="0" x2="65" y2="75" stroke="#22d3ee" stroke-width="6"/>
    <line x1="105" y1="0" x2="110" y2="70" stroke="#67e8f9" stroke-width="5"/>
  </g>

  <!-- Main coral formation -->
  <g transform="translate(70, 112)" filter="url(#coralGlow)">
    <path d="M-4 0 Q-6 -16 -12 -30 Q-15 -38 -10 -48 Q-7 -56 -12 -66 Q-14 -72 -10 -78" stroke="url(#gCoral)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M-12 -30 Q-22 -38 -28 -46" stroke="url(#gCoral)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M-28 -46 Q-34 -52 -32 -58" stroke="url(#gCoral)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M-10 -48 Q-2 -56 2 -64" stroke="url(#gCoral)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M-12 -66 Q-20 -72 -24 -68" stroke="url(#gCoral)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-10" cy="-78" r="3.5" fill="#ec4899" opacity="0.7"/>
    <circle cx="-32" cy="-58" r="3" fill="#f472b6" opacity="0.6"/>
    <circle cx="2" cy="-64" r="2.5" fill="#ec4899" opacity="0.5"/>
    <circle cx="-24" cy="-68" r="2" fill="#f472b6" opacity="0.5"/>

    <path d="M8 0 Q12 -14 16 -28 Q18 -36 14 -46 Q11 -54 16 -64 Q18 -70 14 -76" stroke="url(#gCyan)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M16 -28 Q26 -34 30 -42" stroke="url(#gCyan)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M30 -42 Q34 -48 32 -54" stroke="url(#gCyan)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M14 -46 Q6 -54 4 -60" stroke="url(#gCyan)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M16 -64 Q24 -68 26 -62" stroke="url(#gCyan)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="14" cy="-76" r="3.5" fill="#06b6d4" opacity="0.7"/>
    <circle cx="32" cy="-54" r="3" fill="#22d3ee" opacity="0.6"/>
    <circle cx="4" cy="-60" r="2.5" fill="#06b6d4" opacity="0.5"/>
    <circle cx="26" cy="-62" r="2" fill="#22d3ee" opacity="0.5"/>

    <path d="M0 -2 Q-1 -18 2 -32 Q3 -40 -1 -48 Q-2 -54 1 -60" stroke="url(#gPurple)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
    <circle cx="1" cy="-60" r="2.5" fill="#8b5cf6" opacity="0.5"/>

    <path d="M-20 0 Q-22 -10 -20 -20 Q-19 -26 -22 -32" stroke="url(#gCoral)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <circle cx="-22" cy="-32" r="2" fill="#ec4899" opacity="0.4"/>

    <path d="M26 0 Q28 -12 24 -22 Q22 -28 25 -36 Q26 -42 23 -48" stroke="url(#gGreen)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M-30 0 Q-32 -8 -29 -16 Q-28 -22 -31 -28" stroke="url(#gGreen)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- Fish -->
  <ellipse cx="28" cy="42" rx="7" ry="4" fill="#fbbf24" opacity="0.9"/>
  <polygon points="35,42 42,37 42,47" fill="#f59e0b" opacity="0.85"/>
  <circle cx="25" cy="41" r="1.2" fill="#78350f" opacity="0.8"/>

  <ellipse cx="105" cy="34" rx="5" ry="3" fill="#22d3ee" opacity="0.8"/>
  <polygon points="110,34 114,31 114,37" fill="#06b6d4" opacity="0.7"/>

  <ellipse cx="48" cy="22" rx="4" ry="2.2" fill="#f472b6" opacity="0.6"/>
  <polygon points="52,22 55,20 55,24" fill="#ec4899" opacity="0.5"/>

  <!-- Bubbles -->
  <circle cx="55" cy="55" r="2.5" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
  <circle cx="78" cy="48" r="2" fill="none" stroke="#22d3ee" stroke-width="0.4" opacity="0.25"/>
  <circle cx="42" cy="62" r="1.5" fill="none" stroke="#67e8f9" stroke-width="0.4" opacity="0.2"/>
  <circle cx="90" cy="44" r="1.8" fill="none" stroke="#22d3ee" stroke-width="0.3" opacity="0.2"/>

  <!-- Glow layer -->
  <g filter="url(#softGlow)" opacity="0.3">
    <path d="M58 112 Q54 82 60 46" stroke="#ec4899" stroke-width="3" fill="none"/>
    <path d="M78 112 Q82 82 76 46" stroke="#06b6d4" stroke-width="3" fill="none"/>
  </g>
</svg>
